          options: ["A. sử dụng lực lượng lao động dồi dào tại chỗ.", 
                    "B. tận dụng nguyên vật liệu sẵn có ở nông thôn.", 
                    "C. đảm bảo các nhu cầu thiết yếu của người dân.", 
                    "D. tạo nguồn hàng xuất khẩu lớn ra nước ngoài."], 
          correct: 3 },
        { text: "Câu 32: Các ngành công nghiệp phát triển ở địa bàn nông thôn Trung Quốc không phải là", 
          options: ["A. điện tử, luyện kim.", 
                    "B. vật liệu xây dựng, sứ.", 
                    "C. đồ gốm, dệt may.", 
                    "D. sản xuất hàng tiêu dùng."], 
          correct: 0 }
    ];

    // ---------- Trạng thái ----------
    let userAnswers = new Array(questions.length).fill(null);   // lưu chỉ số đáp án đã chọn (0,1,2,3)
    let currentIndex = 0;
    let submitted = false;

    // DOM elements
    const questionText = document.getElementById("questionText");
    const optionsContainer = document.getElementById("optionsContainer");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const submitBtn = document.getElementById("submitBtn");
    const resetBtn = document.getElementById("resetBtn");
    const resultPanel = document.getElementById("resultPanel");
    const questionCounterSpan = document.getElementById("questionCounter");
    const scoreDisplaySpan = document.getElementById("scoreDisplay");

    function updateStats() {
        const answeredCount = userAnswers.filter(a => a !== null).length;
        scoreDisplaySpan.innerHTML = `📌 Đã trả lời: ${answeredCount}/${questions.length}`;
        questionCounterSpan.innerHTML = `Câu ${currentIndex+1} / ${questions.length}`;
    }

    function renderCurrentQuestion() {
        const q = questions[currentIndex];
        questionText.innerHTML = q.text;
        const selectedIdx = userAnswers[currentIndex];
        optionsContainer.innerHTML = '';
        q.options.forEach((opt, idx) => {
            const optDiv = document.createElement('div');
            optDiv.className = 'opt';
            if (selectedIdx === idx) optDiv.classList.add('selected');
            const prefixSpan = document.createElement('span');
            prefixSpan.className = 'opt-prefix';
            prefixSpan.innerText = String.fromCharCode(65+idx); // A,B,C,D
            const textSpan = document.createElement('span');
            textSpan.className = 'opt-text';
            textSpan.innerText = opt;
            optDiv.appendChild(prefixSpan);
            optDiv.appendChild(textSpan);
            optDiv.addEventListener('click', (e) => {
                if (submitted) return;
                // chọn mới
                if (userAnswers[currentIndex] === idx) {
                    // bỏ chọn? theo thường lệ vẫn giữ hoặc có thể bỏ, nhưng để tiện, giữ nguyên nhưng thường không bỏ. Nếu muốn bỏ thì set null. Nhưng thường trắc nghiệm không bỏ. 
                    // Nhưng ta cho phép bỏ bằng click lại? Tốt hơn là giữ nguyên hoặc switch? Theo UX: click lại bỏ chọn.
                    userAnswers[currentIndex] = null;
                } else {
                    userAnswers[currentIndex] = idx;
                }
                updateStats();
                renderCurrentQuestion(); 
            });
            optionsContainer.appendChild(optDiv);
        });
    }

    function goPrev() {
        if (currentIndex > 0) {
            currentIndex--;
            renderCurrentQuestion();
            updateStats();
        }
    }
    function goNext() {
        if (currentIndex < questions.length-1) {
            currentIndex++;
            renderCurrentQuestion();
            updateStats();
        }
    }

    function calculateScore() {
        let correctCount = 0;
        for (let i=0; i<questions.length; i++) {
            if (userAnswers[i] !== null && userAnswers[i] === questions[i].correct) {
                correctCount++;
            }
        }
        return correctCount;
    }

    function showResults() {
        submitted = true;
        const correctCount = calculateScore();
        const total = questions.length;
        const percent = Math.round((correctCount/total)*100);
        let resultHtml = `<h3>📊 KẾT QUẢ BÀI LÀM</h3>
                          <p>✅ Số câu đúng: <strong>${correctCount}</strong> / ${total}</p>
                          <p>🎯 Tỉ lệ: ${percent}%</p>
                          <div style="margin-top:12px; font-size:0.9rem;">📘 Chi tiết đáp án:</div>`;
        for (let i=0; i<questions.length; i++) {
            const userChoice = userAnswers[i];
            const isCorrect = (userChoice !== null && userChoice === questions[i].correct);
            const userLetter = userChoice !== null ? String.fromCharCode(65+userChoice) : "Chưa trả lời";
            const correctLetter = String.fromCharCode(65+questions[i].correct);
            const status = isCorrect ? "✔️" : (userChoice===null ? "❌ (bỏ trống)" : "❌");
            resultHtml += `<div style="border-top:1px solid #cbdde9; padding: 6px 2px; font-size:0.85rem;">
                            <b>Câu ${i+1}:</b> ${status} &nbsp; <span style="color:#175e7a;">Bạn chọn: ${userLetter}</span> &nbsp; | Đáp án đúng: ${correctLetter}
                            </div>`;
        }
        resultHtml += `<button id="closeResultBtn" style="margin-top:16px; background:#1a6b8a; color:white; padding:6px 20px;">📖 Tiếp tục xem lại câu hỏi</button>`;
        resultPanel.innerHTML = resultHtml;
        resultPanel.style.display = "block";
        const closeBtn = document.getElementById("closeResultBtn");
        if (closeBtn) closeBtn.onclick = () => { resultPanel.style.display = "none"; };
        updateStats();
        renderCurrentQuestion();  
    }

    function resetQuiz() {
        userAnswers = new Array(questions.length).fill(null);
        submitted = false;
        currentIndex = 0;
        resultPanel.style.display = "none";
        resultPanel.innerHTML = "";
        updateStats();
        renderCurrentQuestion();
    }

    // attach events
    prevBtn.addEventListener("click", () => { if(!submitted) goPrev(); else alert("Đã nộp bài, nhấn 'Làm lại' để làm mới."); });
    nextBtn.addEventListener("click", () => { if(!submitted) goNext(); else alert("Đã nộp bài, hãy nhấn 'Làm lại' để bắt đầu bài mới."); });
    submitBtn.addEventListener("click", () => {
        if(submitted) {
            alert("Bạn đã nộp bài rồi! Nhấn 'Làm lại' để làm lại từ đầu.");
            return;
        }
        showResults();
    });
    resetBtn.addEventListener("click", () => { resetQuiz(); });

    // init
    renderCurrentQuestion();
    updateStats();
</script>
</body>
</html>
